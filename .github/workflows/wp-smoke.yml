name: wp-smoke-test

# 一時ワークフロー: GitHub Actions の海外IPから WP REST API に読み書きできるかを確認する。
# 手動実行のみ（cronなし）。検証が済んだらこのファイルと scripts/wp-smoke.mts は削除する。
on:
  workflow_dispatch: {}

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx tsx scripts/wp-smoke.mts
        env:
          WP_BASE_URL: ${{ secrets.WP_BASE_URL }}
          WP_USERNAME: ${{ secrets.WP_USERNAME }}
          WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
